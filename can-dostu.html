<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İçini Dök</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --friend-bg: #0d0d14;
    --friend-surface: #13131e;
    --friend-card: #1a1a2e;
    --friend-accent: #7c6fcd;
    --friend-accent2: #a78bfa;
    --friend-glow: rgba(124,111,205,0.15);
    --friend-text: #e8e4f8;
    --friend-muted: #9891b8;
    --friend-border: rgba(124,111,205,0.2);

    --devil-bg: #0e0a0a;
    --devil-surface: #160e0e;
    --devil-card: #1e1010;
    --devil-accent: #c0392b;
    --devil-accent2: #e74c3c;
    --devil-glow: rgba(192,57,43,0.15);
    --devil-text: #f0e8e8;
    --devil-muted: #9e8080;
    --devil-border: rgba(192,57,43,0.2);

    --bg: var(--friend-bg);
    --surface: var(--friend-surface);
    --card: var(--friend-card);
    --accent: var(--friend-accent);
    --accent2: var(--friend-accent2);
    --glow: var(--friend-glow);
    --text: var(--friend-text);
    --muted: var(--friend-muted);
    --border: var(--friend-border);

    --transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  body.devil-mode {
    --bg: var(--devil-bg);
    --surface: var(--devil-surface);
    --card: var(--devil-card);
    --accent: var(--devil-accent);
    --accent2: var(--devil-accent2);
    --glow: var(--devil-glow);
    --text: var(--devil-text);
    --muted: var(--devil-muted);
    --border: var(--devil-border);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    transition: background var(--transition), color var(--transition);
    overflow-x: hidden;
  }

  /* Ambient background orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.25;
    pointer-events: none;
    transition: background var(--transition);
    z-index: 0;
  }
  .orb-1 {
    width: 400px; height: 400px;
    background: var(--accent);
    top: -100px; left: -100px;
  }
  .orb-2 {
    width: 300px; height: 300px;
    background: var(--accent2);
    bottom: 100px; right: -80px;
  }

  /* Header */
  header {
    position: relative;
    z-index: 10;
    padding: 1.5rem 2rem 1rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    transition: border-color var(--transition);
    backdrop-filter: blur(10px);
    background: rgba(0,0,0,0.2);
  }

  .logo {
    font-family: 'Lora', serif;
    font-style: italic;
    font-size: 1.4rem;
    color: var(--accent2);
    transition: color var(--transition);
    letter-spacing: -0.02em;
  }

  /* Mode toggle */
  .mode-toggle {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 4px;
    gap: 4px;
    transition: border-color var(--transition);
  }

  .mode-btn {
    padding: 0.45rem 1.1rem;
    border: none;
    border-radius: 50px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s ease;
    background: transparent;
    color: var(--muted);
    letter-spacing: 0.01em;
    white-space: nowrap;
  }

  .mode-btn.active {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 0 20px var(--glow);
  }

  /* Chat area */
  .chat-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
    padding: 2rem 1.5rem 0;
    position: relative;
    z-index: 5;
  }

  .messages {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
    padding-bottom: 2rem;
    min-height: 200px;
  }

  /* Welcome state */
  .welcome {
    text-align: center;
    padding: 3rem 1rem 2rem;
    animation: fadeUp 0.6s ease forwards;
  }
  .welcome-icon {
    font-size: 2.5rem;
    margin-bottom: 1rem;
    display: block;
  }
  .welcome h1 {
    font-family: 'Lora', serif;
    font-size: 1.8rem;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 0.75rem;
    line-height: 1.3;
  }
  .welcome p {
    font-size: 0.95rem;
    color: var(--muted);
    max-width: 400px;
    margin: 0 auto;
    line-height: 1.6;
  }

  /* Message bubbles */
  .msg {
    display: flex;
    flex-direction: column;
    animation: fadeUp 0.4s ease forwards;
    opacity: 0;
  }

  .msg.user {
    align-items: flex-end;
  }
  .msg.ai {
    align-items: flex-start;
  }

  .msg-label {
    font-size: 0.72rem;
    color: var(--muted);
    margin-bottom: 0.4rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    font-weight: 500;
  }

  .bubble {
    max-width: 88%;
    padding: 1rem 1.25rem;
    border-radius: 18px;
    line-height: 1.7;
    font-size: 0.95rem;
    position: relative;
  }

  .msg.user .bubble {
    background: var(--accent);
    color: #fff;
    border-bottom-right-radius: 4px;
    box-shadow: 0 4px 20px var(--glow);
  }

  .msg.ai .bubble {
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    font-family: 'Lora', serif;
    font-size: 1rem;
    line-height: 1.8;
  }

  /* Typing indicator */
  .typing-bubble {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    border-bottom-left-radius: 4px;
    padding: 1rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 5px;
    width: fit-content;
  }
  .dot {
    width: 7px; height: 7px;
    background: var(--accent2);
    border-radius: 50%;
    animation: bounce 1.2s ease infinite;
    transition: background var(--transition);
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  /* Input area */
  .input-area {
    position: sticky;
    bottom: 0;
    padding: 1.25rem 0 2rem;
    background: linear-gradient(to bottom, transparent, var(--bg) 40%);
    transition: background var(--transition);
  }

  .input-wrapper {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 0.875rem 1rem 0.875rem 1.25rem;
    display: flex;
    align-items: flex-end;
    gap: 0.75rem;
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
  }

  .input-wrapper:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--glow);
  }

  textarea {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    line-height: 1.5;
    resize: none;
    min-height: 24px;
    max-height: 160px;
    padding: 0;
  }

  textarea::placeholder { color: var(--muted); }

  .send-btn {
    width: 38px; height: 38px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    flex-shrink: 0;
  }
  .send-btn:hover { opacity: 0.85; transform: scale(1.05); }
  .send-btn:active { transform: scale(0.96); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .send-btn svg { width: 16px; height: 16px; }

  /* Mode subtitle */
  .mode-hint {
    text-align: center;
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 0.6rem;
    letter-spacing: 0.03em;
    transition: color var(--transition);
  }

  /* Cursor for streaming */
  .cursor {
    display: inline-block;
    width: 2px;
    height: 1em;
    background: var(--accent2);
    margin-left: 2px;
    vertical-align: text-bottom;
    animation: blink 0.8s step-end infinite;
  }

  @keyframes blink { 50% { opacity: 0; } }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* Mode transition flash */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: var(--accent);
    opacity: 0;
    pointer-events: none;
    z-index: 100;
    transition: opacity 0.15s ease;
  }
  body.flash::after { opacity: 0.04; }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<header>
  <div class="logo">içini dök</div>
  <div class="mode-toggle">
    <button class="mode-btn active" id="btn-friend" onclick="setMode('friend')">💜 Can Dostu</button>
    <button class="mode-btn" id="btn-devil" onclick="setMode('devil')">😈 Kötünün Avukatı</button>
  </div>
</header>

<div class="chat-container">
  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <span class="welcome-icon">💜</span>
      <h1>Nasıl hissediyorsun bugün?</h1>
      <p>Aklına geleni yaz. Yargılamadan, gerçekten dinleyeceğim.</p>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrapper">
      <textarea
        id="userInput"
        placeholder="Bugün aklına ne takıldı..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <div class="mode-hint" id="modeHint">Can Dostu modu — seni anlayan, gerçek bir ses</div>
  </div>
</div>

<script>
const API_KEY = 'AIzaSyAf-I_23MK4NjY9sl8BV5JdUUQP93zO4ls';

let currentMode = 'friend';
let isLoading = false;

const SYSTEM_PROMPTS = {
  friend: `Sen yüksek duygusal zekaya sahip, empatik ve samimi bir en yakın arkadaşsın.

Kişiliğin:
- Sıcak, anlayışlı ve gerçekçi (yapay pozitiflik yok)
- Karşı tarafı gerçekten dinleyen ve anladığını hissettiren
- Gerektiğinde dürüst ama asla kırıcı olmayan
- Bir terapist gibi değil, gerçek bir arkadaş gibi konuşan
- Bazen kullanıcının fark etmediği şeyleri nazikçe fark ettiren

Amaçların:
- Kullanıcının anlaşılmış hissetmesini sağlamak
- Yazdıklarından anlam çıkarıp ona içgörü kazandırmak
- Gerçek bir insanla gece sohbeti ediyormuş hissi vermek

Kurallar:
- Madde işaretleri kullanma
- Fazla açıklama yapma
- Robotik veya genel geçer cümleler kurma
- Kullanıcının yazdıklarına spesifik referanslar ver
- Gerektiğinde 1 tane anlamlı soru sor

Ton: Doğal, samimi, hafif gündelik ama derin, insan gibi.
Uzunluk: Orta uzunlukta (çok kısa ya da çok uzun değil).
Cevabını tek bir mesaj gibi yaz, paragraf paragraf doğal bir sohbet akışı olsun.`,

  devil: `Sen insan davranışlarını iyi analiz eden, keskin gözlemci birisin.

Kişiliğin:
- Zeki, gözlemci, biraz sert ama mantıklı
- Gerçek bir insan gibi konuşan

Rolün:
- Kullanıcının anlattıklarını analiz etmek
- İnsanların onun hakkında aslında ne düşünebileceğini söylemek
- Söylenmeyen ama hissedilen şeyleri ortaya koymak

ÇOK ÖNEMLİ KURALLAR:
- Asla hakaret etme
- Aşağılayıcı veya saldırgan olma
- Aşırıya kaçma
- Yorumların gerçekçi ve psikolojik olarak mantıklı olsun
- Eleştirel ol ama inandırıcı kal

Stil: Sanki onun hakkında başkalarıyla konuşuyormuş gibi. "Dışarıdan bakınca bazı insanlar seni..." "Açık konuşmak gerekirse..." "Bazı kişiler şöyle düşünebilir..." tarz ifadeler kullan.
Ton: Sakin, ciddi, hafif rahatsız edici ama gerçekçi.
Yapı: Güçlü bir gözlemle başla, neden düşündüklerini açıkla, sonunda hafif bir farkındalık bırak.
Uzunluk: Orta.
Cevabını tek bir mesaj gibi yaz, paragraf paragraf doğal bir sohbet akışı olsun.`
};

const USER_TEMPLATES = {
  friend: (input) => `Bugün günlüğüme şunları yazdım:\n\n"${input}"\n\nBana en yakın arkadaşım gibi cevap ver.`,
  devil: (input) => `Kendimi veya bir durumu şöyle anlatıyorum:\n\n"${input}"\n\nİnsanlar benim hakkımda gerçekte ne düşünüyor olabilir? Dürüst ol.`
};

function setMode(mode) {
  if (mode === currentMode) return;
  currentMode = mode;
  const body = document.body;

  // Flash effect
  body.classList.add('flash');
  setTimeout(() => body.classList.remove('flash'), 300);

  if (mode === 'devil') {
    body.classList.add('devil-mode');
    document.getElementById('btn-devil').classList.add('active');
    document.getElementById('btn-friend').classList.remove('active');
    document.getElementById('modeHint').textContent = 'Kötünün Avukatı modu — dışarıdan bakan gözler';
    document.querySelector('.welcome-icon').textContent = '😈';
    document.querySelector('.welcome h1').textContent = 'Ne anlatmak istiyorsun?';
    document.querySelector('.welcome p').textContent = 'Bir durum, bir karar, kendin hakkında bir şey. Dürüst bakacağım.';
    document.getElementById('userInput').placeholder = 'Bir durum veya kendinle ilgili bir şey yaz...';
  } else {
    body.classList.remove('devil-mode');
    document.getElementById('btn-friend').classList.add('active');
    document.getElementById('btn-devil').classList.remove('active');
    document.getElementById('modeHint').textContent = 'Can Dostu modu — seni anlayan, gerçek bir ses';
    document.querySelector('.welcome-icon').textContent = '💜';
    document.querySelector('.welcome h1').textContent = 'Nasıl hissediyorsun bugün?';
    document.querySelector('.welcome p').textContent = 'Aklına geleni yaz. Yargılamadan, gerçekten dinleyeceğim.';
    document.getElementById('userInput').placeholder = 'Bugün aklına ne takıldı...';
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function appendMessage(role, text) {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = role === 'user' ? 'sen' : (currentMode === 'friend' ? 'can dostun' : 'kötünün avukatı');

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;

  div.appendChild(label);
  div.appendChild(bubble);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return bubble;
}

function showTyping() {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'typing-indicator';

  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = currentMode === 'friend' ? 'can dostun' : 'kötünün avukatı';

  const typing = document.createElement('div');
  typing.className = 'typing-bubble';
  typing.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

  div.appendChild(label);
  div.appendChild(typing);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  input.value = '';
  input.style.height = 'auto';

  appendMessage('user', text);
  showTyping();

  try {
    const userContent = USER_TEMPLATES[currentMode](text);
    const systemPrompt = SYSTEM_PROMPTS[currentMode];

    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-goog-api-key': API_KEY },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: systemPrompt }] },
          contents: [{ role: 'user', parts: [{ text: userContent }] }],
          generationConfig: { temperature: 0.9, maxOutputTokens: 1024 }
        })
      }
    );

    const data = await response.json();

    if (!response.ok) {
      const errMsg = data?.error?.message || JSON.stringify(data);
      console.error('Gemini API error:', data);
      throw new Error(errMsg);
    }

    const fullText = data?.candidates?.[0]?.content?.parts?.[0]?.text || '';

    removeTyping();

    // Create AI bubble and typewriter-animate
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg ai';

    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = currentMode === 'friend' ? 'can dostun' : 'kötünün avukatı';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    const cursor = document.createElement('span');
    cursor.className = 'cursor';

    div.appendChild(label);
    div.appendChild(bubble);
    msgs.appendChild(div);
    bubble.appendChild(cursor);

    // Typewriter effect
    let i = 0;
    const speed = 18; // ms per char
    function typeNext() {
      if (i < fullText.length) {
        bubble.textContent = fullText.slice(0, i + 1);
        bubble.appendChild(cursor);
        i++;
        msgs.scrollTop = msgs.scrollHeight;
        setTimeout(typeNext, speed);
      } else {
        cursor.remove();
        isLoading = false;
        document.getElementById('sendBtn').disabled = false;
        document.getElementById('userInput').focus();
      }
    }
    typeNext();
    return; // early return — isLoading reset handled by typewriter

  } catch (err) {
    removeTyping();
    appendMessage('ai', `Bir şeyler ters gitti: ${err.message}`);
    console.error(err);
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('userInput').focus();
}
</script>
</body>
</html>
